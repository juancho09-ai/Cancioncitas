<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frases para ti 💌</title>

  <style></style>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="galaxyCanvas" class="hidden"></canvas>

  <main class="container">
    <section class="sobre" id="sobre">
      <div class="corazon">❤️</div>
      <h1>Una frase para ti</h1>
      <p>Hay canciones que me recuerdan a ti...</p>
      <button id="abrirBtn">Abrir 💌</button>
    </section>

    <section class="carta hidden" id="carta">
      <p id="frase"></p>
      <h3 id="autor"></h3>
      <span id="cancion"></span>

      <div class="botones">
        <button id="otraBtn">Otra frase 🎵</button>
        <button id="cerrarBtn">Cerrar 💌</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
